<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL 내전 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0a; --surface:#111; --surface2:#1a1a1a; --border:#2a2a2a;
    --gold:#C89B3C; --gold-light:#F0E6A0; --silver:#A0B4C8; --bronze:#CD7F32;
    --text:#f0f0f0; --text-dim:#555; --text-mid:#888;
    --accent:#4FC3F7; --red:#EF5350; --green:#66BB6A;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh}

  header{border-bottom:1px solid var(--border);padding:20px 48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(10,10,10,0.96);backdrop-filter:blur(12px);z-index:100}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:var(--gold)}
  .logo span{color:var(--text)}
  nav{display:flex;gap:4px}
  nav button{background:none;border:1px solid transparent;color:var(--text-mid);padding:7px 18px;font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;letter-spacing:1px;transition:all .2s;border-radius:2px}
  nav button:hover{color:var(--text);border-color:var(--border)}
  nav button.active{color:var(--gold);border-color:var(--gold);background:rgba(200,155,60,.08)}
  .refresh-btn{background:var(--gold);color:#000;border:none;padding:9px 22px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .2s}
  .refresh-btn:hover{background:var(--gold-light)}
  .refresh-btn:disabled{opacity:.5;cursor:not-allowed}

  .view{display:none;padding:40px 48px;animation:fadeIn .35s ease}
  .view.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  .section-header{display:flex;align-items:baseline;gap:14px;margin-bottom:32px}
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:6px}
  .section-sub{font-size:11px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase}

  .summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-bottom:40px}
  .summary-item{background:var(--surface);border:1px solid var(--border);padding:18px 22px;text-align:center}
  .summary-num{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--gold);letter-spacing:2px}
  .summary-label{font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-top:3px}

  .awards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:2px}
  .award-card{background:var(--surface);border:1px solid var(--border);padding:26px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s}
  .award-card:hover{border-color:var(--gold);transform:translateY(-2px)}
  .award-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent)}
  .award-category{font-size:10px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px}
  .award-title{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:2px;color:var(--gold);margin-bottom:6px}
  .award-sub{font-size:11px;color:var(--text-dim);letter-spacing:1px;margin-bottom:18px}
  .award-podium{display:flex;flex-direction:column;gap:8px}
  .podium-row{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--surface2);border-radius:2px;transition:background .2s}
  .podium-row:hover{background:#222}
  .rank-badge{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
  .rank-1{background:var(--gold);color:#000}.rank-2{background:var(--silver);color:#000}.rank-3{background:var(--bronze);color:#fff}
  .podium-name{flex:1;font-size:13px;font-weight:500}
  .podium-value{font-size:13px;font-weight:700;color:var(--gold-light)}
  .podium-unit{font-size:10px;color:var(--text-dim);margin-left:2px}

  .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:2px}
  .player-card{background:var(--surface);border:1px solid var(--border);overflow:hidden;transition:border-color .2s,transform .2s}
  .player-card:hover{border-color:#444;transform:translateY(-2px)}
  .player-header{padding:22px 22px 18px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#111 0%,#1a1612 100%);display:flex;justify-content:space-between;align-items:flex-start}
  .player-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#7B5A1A);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:22px;color:#000;border:2px solid var(--gold);flex-shrink:0}
  .player-info{flex:1;margin-left:12px}
  .player-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;line-height:1}
  .player-discord{font-size:11px;color:var(--text-dim);margin-top:4px}
  .player-badges{display:flex;flex-direction:column;gap:3px;align-items:flex-end}
  .badge{font-size:10px;letter-spacing:1px;padding:2px 7px;border-radius:2px;font-weight:700}
  .badge-mvp{background:rgba(200,155,60,.2);color:var(--gold);border:1px solid var(--gold)}
  .badge-ace{background:rgba(239,83,80,.15);color:var(--red);border:1px solid var(--red)}
  .player-body{padding:16px 20px 20px}
  .kda-display{display:flex;justify-content:center;align-items:baseline;gap:5px;margin-bottom:4px}
  .kda-num{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px}
  .kda-k{color:var(--green)}.kda-d{color:var(--red)}.kda-a{color:var(--accent)}
  .kda-sep{color:var(--text-dim);font-size:18px}
  .kda-ratio{font-size:10px;color:var(--text-dim);text-align:center;margin-bottom:12px;letter-spacing:1px}
  .winrate-bar-wrap{margin-bottom:14px}
  .winrate-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim);margin-bottom:5px;letter-spacing:1px}
  .winrate-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
  .winrate-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:2px}
  .stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1c1c1c}
  .stat-row:last-child{border-bottom:none}
  .stat-label{font-size:11px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase}
  .stat-value{font-size:13px;font-weight:700}
  .sv-gold{color:var(--gold-light)}.sv-accent{color:var(--accent)}.sv-green{color:var(--green)}

  .status-box{text-align:center;padding:80px 0}
  .spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .status-box p{font-size:13px;color:var(--text-mid);letter-spacing:1px}
  .error-box{background:#1a0a0a;border:1px solid #3a1a1a;border-radius:4px;padding:20px 24px;margin:20px 0}
  .error-box p{font-size:13px;color:#ff6b6b}

  @media(max-width:768px){
    header{padding:14px 16px}
    .view{padding:24px 16px}
    .summary-bar{grid-template-columns:repeat(2,1fr)}
    nav button{padding:6px 10px;font-size:11px}
  }
</style>
</head>
<body>

<header>
  <div class="logo">LOL<span>STATS</span></div>
  <nav>
    <button class="active" onclick="switchView('awards',this)">🏆 어워즈</button>
    <button onclick="switchView('players',this)">📊 선수 스탯</button>
  </nav>
  <button class="refresh-btn" id="refreshBtn" onclick="loadData()">↻ 데이터 갱신</button>
</header>

<div id="awards" class="view active">
  <div class="section-header">
    <div class="section-title">SEASON AWARDS</div>
    <div class="section-sub">내전 부문별 타이틀 홀더</div>
  </div>
  <div class="summary-bar">
    <div class="summary-item"><div class="summary-num" id="s-games">-</div><div class="summary-label">총 게임 수</div></div>
    <div class="summary-item"><div class="summary-num" id="s-players">-</div><div class="summary-label">참가 선수</div></div>
    <div class="summary-item"><div class="summary-num" id="s-kda">-</div><div class="summary-label">평균 KDA</div></div>
    <div class="summary-item"><div class="summary-num" id="s-gametime">-</div><div class="summary-label">평균 게임 시간</div></div>
  </div>
  <div id="awardsContent"><div class="status-box"><div class="spinner"></div><p>데이터 불러오는 중...</p></div></div>
</div>

<div id="players" class="view">
  <div class="section-header">
    <div class="section-title">PLAYER STATS</div>
    <div class="section-sub">개인별 상세 스탯 프로필</div>
  </div>
  <div id="playersContent"><div class="status-box"><div class="spinner"></div><p>데이터 불러오는 중...</p></div></div>
</div>

<script>
const SHEET_ID = '1B0S8jip0CUnGfPleVtdqn8d_4oYMYsZa9PvkexoOiZk';
const SHEET_NAME = 'DB';
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = parseCSVLine(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = parseCSVLine(lines[i]);
    const obj = {};
    headers.forEach((h, idx) => { obj[h.trim().replace(/^"|"$/g,'')] = (vals[idx]||'').trim().replace(/^"|"$/g,''); });
    rows.push(obj);
  }
  return rows;
}

function parseCSVLine(line) {
  const result=[]; let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur);cur='';}
    else{cur+=c;}
  }
  result.push(cur);
  return result;
}

function n(v){return parseFloat((v||'0').toString().replace(/,/g,''))||0;}
function s(v){return(v||'').toString().trim();}

async function loadData(){
  const btn=document.getElementById('refreshBtn');
  btn.disabled=true; btn.textContent='↻ 로딩 중...';
  const loading='<div class="status-box"><div class="spinner"></div><p>Google Sheets에서 데이터 불러오는 중...</p></div>';
  document.getElementById('awardsContent').innerHTML=loading;
  document.getElementById('playersContent').innerHTML=loading;

  try{
    const res=await fetch(CSV_URL);
    if(!res.ok) throw new Error('시트를 불러올 수 없습니다. 공유 설정을 확인해주세요.');
    const text=await res.text();
    const rows=parseCSV(text);
    if(rows.length===0) throw new Error('데이터가 없습니다.');
    processAndRender(rows);
  }catch(e){
    const err=`<div class="error-box"><p>⚠️ ${e.message}</p><p style="margin-top:8px;color:#666;font-size:12px">Google Sheets 공유 설정: 링크가 있는 모든 사용자 → 뷰어</p></div>`;
    document.getElementById('awardsContent').innerHTML=err;
    document.getElementById('playersContent').innerHTML=err;
  }finally{
    btn.disabled=false; btn.textContent='↻ 데이터 갱신';
  }
}

function processAndRender(rows){
  const data=rows.filter(r=>s(r['소환사명'])!=='');

  // 고유 매치 수
  const matchIds=[...new Set(data.map(r=>s(r['매치ID'])).filter(Boolean))];

  // 선수별 집계
  const pm={};
  data.forEach(r=>{
    const name=s(r['소환사명']);
    const discord=s(r['디스코드ID'])||name;
    if(!name) return;
    if(!pm[name]) pm[name]={name,discord,games:0,wins:0,kills:0,deaths:0,assists:0,totalDmg:0,dpmSum:0,gpmSum:0,totalCS:0,gameSec:0,receivedDmg:0,soloKills:0,wardsPlaced:0,aiScoreSum:0,mvp:0,ace:0,dmgShareSum:0,dmgShareCnt:0};
    const p=pm[name];
    p.games++;
    const win=s(r['승패']);
    if(win==='승리'||win==='승') p.wins++;
    p.kills    +=n(r['K']);
    p.deaths   +=n(r['D']);
    p.assists  +=n(r['A']);
    p.totalDmg +=n(r['총딜량']);
    // DPM 컬럼명 다양하게 대응
    p.dpmSum   +=n(r['분당딜(DPM)'])||n(r['분당딜'])||n(r['DPM'])||n(r['분당대미지']);
    p.gpmSum   +=n(r['분당골드(GPM)'])||n(r['분당골드'])||n(r['GPM']);
    p.totalCS  +=n(r['총CS']);
    p.gameSec  +=n(r['게임시간']);
    p.receivedDmg+=n(r['받은피해']);
    p.soloKills  +=n(r['솔로킬']);
    p.wardsPlaced+=n(r['와드설치']);
    p.aiScoreSum +=n(r['AI스코어']);
    const note=s(r['비고']).toUpperCase();
    if(note.includes('MVP')) p.mvp++;
    if(note.includes('ACE')) p.ace++;
  });

  // 팀 딜 비중 계산 (매치별 승/패 팀 분리)
  const mg={};
  data.forEach(r=>{
    const mid=s(r['매치ID']);
    if(!mg[mid]) mg[mid]=[];
    mg[mid].push(r);
  });
  Object.values(mg).forEach(match=>{
    const tw=match.filter(r=>{ const w=s(r['승패']); return w==='승리'||w==='승'; });
    const tl=match.filter(r=>{ const w=s(r['승패']); return w==='패배'||w==='패'; });
    [tw,tl].forEach(team=>{
      if(!team.length) return;
      const tot=team.reduce((s,r)=>s+n(r['총딜량']),0);
      if(!tot) return;
      team.forEach(r=>{
        const name=s(r['소환사명']);
        if(pm[name]){ pm[name].dmgShareSum+=(n(r['총딜량'])/tot)*100; pm[name].dmgShareCnt++; }
      });
    });
  });

  // 최종 스탯
  const players=Object.values(pm).map(p=>{
    const gm=p.games||1;
    const gmin=(p.gameSec||1)/60;
    return {
      name:p.name, discord:p.discord, games:p.games, wins:p.wins,
      kills:+(p.kills/gm).toFixed(1),
      deaths:+(p.deaths/gm).toFixed(1),
      assists:+(p.assists/gm).toFixed(1),
      kdaRatio:p.deaths===0?+(p.kills+p.assists).toFixed(1):+((p.kills+p.assists)/p.deaths).toFixed(2),
      totalKills:p.kills,
      totalAssists:p.assists,
      dpm:Math.round(p.dpmSum/gm),
      gpm:Math.round(p.gpmSum/gm),
      cspm:+(p.totalCS/gmin).toFixed(1),
      dmgShare:p.dmgShareCnt>0?+(p.dmgShareSum/p.dmgShareCnt).toFixed(1):0,
      receivedDmg:Math.round(p.receivedDmg/gm),
      soloKills:p.soloKills,
      wardsPlaced:p.wardsPlaced,
      aiScore:+(p.aiScoreSum/gm).toFixed(1),
      mvp:p.mvp, ace:p.ace,
    };
  });

  // 요약
  const allRows=data.length||1;
  const avgKDA=data.reduce((sum,r)=>{
    const d=n(r['D']); return sum+(d===0?n(r['K'])+n(r['A']):(n(r['K'])+n(r['A']))/d);
  },0)/allRows;
  const avgMin=data.reduce((sum,r)=>sum+n(r['게임시간']),0)/allRows/60;

  document.getElementById('s-games').textContent   = matchIds.length;
  document.getElementById('s-players').textContent = players.length;
  document.getElementById('s-kda').textContent     = avgKDA.toFixed(1);
  document.getElementById('s-gametime').textContent= avgMin.toFixed(1)+'분';

  renderAwards(players);
  renderPlayers(players);
}

function top3(players,key){
  return [...players].sort((a,b)=>b[key]-a[key]).slice(0,3).map(p=>({n:p.name,val:p[key]}));
}

function renderAwards(players){
  const awards=[
    {cat:'솔로킬',   title:'솔킬 머신',         sub:'솔로킬 누적 합산',        unit:'킬', pod:top3(players,'soloKills'),     fmt:v=>Math.round(v).toLocaleString()},
    {cat:'딜링',     title:'나 완전 데프트야',    sub:'분당 대미지 (DPM) 평균',  unit:'',   pod:top3(players,'dpm'),            fmt:v=>Math.round(v).toLocaleString()},
    {cat:'킬',       title:'피 냄새 맡는 중',     sub:'킬 누적 합산',            unit:'킬', pod:top3(players,'totalKills'),    fmt:v=>Math.round(v).toLocaleString()},
    {cat:'어시스트', title:'보이지 않는 손',      sub:'어시스트 누적 합산',      unit:'A',  pod:top3(players,'totalAssists'),  fmt:v=>Math.round(v).toLocaleString()},
    {cat:'골드',     title:'골드킹',              sub:'분당 골드 (GPM) 평균',    unit:'',   pod:top3(players,'gpm'),            fmt:v=>Math.round(v).toLocaleString()},
    {cat:'CS',       title:'CS 놓치면 잠 못 잠', sub:'분당 CS 평균 (CSPM)',     unit:'',   pod:top3(players,'cspm'),           fmt:v=>(+v).toFixed(1)},
    {cat:'시야',     title:'맵핵',                sub:'와드 설치 누적 합산',     unit:'개', pod:top3(players,'wardsPlaced'),   fmt:v=>Math.round(v).toLocaleString()},
    {cat:'딜 비중',  title:'딜은 내가 책임진다', sub:'팀 내 딜 비중 평균',      unit:'%',  pod:top3(players,'dmgShare'),       fmt:v=>(+v).toFixed(1)},
    {cat:'생존',     title:'버티는 자가 이긴다', sub:'평균 받은 피해량',        unit:'',   pod:top3(players,'receivedDmg'),   fmt:v=>Math.round(v).toLocaleString()},
    {cat:'AI 스코어',title:'협곡 시험 만점',      sub:'AI 스코어 평균',          unit:'점', pod:top3(players,'aiScore'),        fmt:v=>(+v).toFixed(1)},
    {cat:'MVP',      title:'POTG',                sub:'MVP 수상 횟수',           unit:'회', pod:top3(players,'mvp'),            fmt:v=>Math.round(v)},
  ];

  document.getElementById('awardsContent').innerHTML=`<div class="awards-grid">${
    awards.map(a=>`
      <div class="award-card">
        <div class="award-category">${a.cat}</div>
        <div class="award-title">${a.title}</div>
        <div class="award-sub">${a.sub}</div>
        <div class="award-podium">${
          a.pod.length===0
            ? '<div style="color:var(--text-dim);font-size:12px;padding:8px">데이터 없음</div>'
            : a.pod.map((p,i)=>`
              <div class="podium-row">
                <div class="rank-badge rank-${i+1}">${i+1}</div>
                <div class="podium-name">${p.n}</div>
                <div class="podium-value">${a.fmt(p.val)}<span class="podium-unit">${a.unit}</span></div>
              </div>`).join('')
        }</div>
      </div>`).join('')
  }</div>`;
}

function renderPlayers(players){
  const sorted=[...players].sort((a,b)=>b.games-a.games);
  document.getElementById('playersContent').innerHTML=`<div class="stats-grid">${
    sorted.map(p=>{
      const wr=Math.round(p.wins/p.games*100);
      return `
      <div class="player-card">
        <div class="player-header">
          <div class="player-avatar">${p.name[0]}</div>
          <div class="player-info">
            <div class="player-name">${p.name}</div>
            <div class="player-discord">${p.discord}</div>
          </div>
          <div class="player-badges">
            ${p.mvp>0?`<div class="badge badge-mvp">MVP ×${p.mvp}</div>`:''}
            ${p.ace>0?`<div class="badge badge-ace">ACE ×${p.ace}</div>`:''}
          </div>
        </div>
        <div class="player-body">
          <div class="kda-display">
            <span class="kda-num kda-k">${p.kills}</span><span class="kda-sep">/</span>
            <span class="kda-num kda-d">${p.deaths}</span><span class="kda-sep">/</span>
            <span class="kda-num kda-a">${p.assists}</span>
          </div>
          <div class="kda-ratio">KDA ${p.kdaRatio}:1 &nbsp;·&nbsp; ${p.games}게임</div>
          <div class="winrate-bar-wrap">
            <div class="winrate-label"><span>승률</span><span>${wr}% (${p.wins}승 ${p.games-p.wins}패)</span></div>
            <div class="winrate-bar"><div class="winrate-fill" style="width:${wr}%"></div></div>
          </div>
          <div class="stat-row"><span class="stat-label">DPM</span><span class="stat-value sv-accent">${p.dpm.toLocaleString()}</span></div>
          <div class="stat-row"><span class="stat-label">GPM</span><span class="stat-value sv-gold">${p.gpm.toLocaleString()}</span></div>
          <div class="stat-row"><span class="stat-label">CSPM</span><span class="stat-value">${p.cspm}</span></div>
          <div class="stat-row"><span class="stat-label">딜 비중</span><span class="stat-value ${p.dmgShare>=28?'sv-green':''}">${p.dmgShare.toFixed(1)}%</span></div>
          <div class="stat-row"><span class="stat-label">솔로킬</span><span class="stat-value">${p.soloKills}</span></div>
          <div class="stat-row"><span class="stat-label">와드 설치</span><span class="stat-value">${p.wardsPlaced}</span></div>
          <div class="stat-row"><span class="stat-label">AI 스코어</span><span class="stat-value sv-gold">${p.aiScore}</span></div>
        </div>
      </div>`;
    }).join('')
  }</div>`;
}

function switchView(id,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

loadData();
</script>
</body>
</html>
