<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOL STATS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07070f;--s1:#0d0d1a;--s2:#111120;--s3:#161625;--s4:#1c1c2e;
  --b1:#1a1a2e;--b2:#22223a;--b3:#2e2e50;
  --gold:#C89B3C;--gl:#F0E6A0;--gd:rgba(200,155,60,.12);--gb:rgba(200,155,60,.06);
  --silver:#A0B4C8;--bronze:#CD7F32;
  --txt:#d8dcee;--dim:#2e2e50;--mid:#5a5a8a;
  --cyan:#4FC3F7;--cyan2:rgba(79,195,247,.15);
  --pink:#ef6fa8;--pink2:rgba(239,111,168,.15);
  --purple:#9c6fff;--red:#EF5350;--green:#66BB6A;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--txt);
  font-family:'Noto Sans KR',sans-serif;
  font-size:14px;font-weight:400;
  line-height:1.6;letter-spacing:-.01em; 
  min-height:100vh;overflow-x:hidden;
  word-break:keep-all; 
}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.3;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:200;height:54px;
  background:rgba(7,7,15,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--b1);
  display:flex;align-items:center;padding:0 32px;gap:28px;
}
.logo{font-family:'Bebas Neue';font-size:19px;letter-spacing:5px;color:var(--gold);display:flex;align-items:center;gap:7px;white-space:nowrap}
.logo-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:pdot 2.5s ease-in-out infinite}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:.15;transform:scale(.5)}}
nav{display:flex;flex:1}
.nb{background:none;border:none;color:var(--mid);padding:0 16px;height:54px;font-family:'Noto Sans KR';font-size:11px;font-weight:500;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:color .2s;position:relative}
.nb::after{content:'';position:absolute;bottom:0;left:16px;right:16px;height:2px;background:var(--gold);transform:scaleX(0);transition:transform .25s;border-radius:2px 2px 0 0}
.nb:hover{color:var(--txt)}.nb.on{color:var(--gold)}.nb.on::after{transform:scaleX(1)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.hdr-icon{width:32px;height:32px;border-radius:50%;border:1px solid var(--b2);background:var(--s1);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:border-color .2s}
.hdr-icon:hover{border-color:var(--gold)}

/* ── VIEWS ── */
.view{display:none;position:relative;z-index:1;animation:fup .3s ease}
.view.on{display:flex;flex-direction:column}
@keyframes fup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PLAYER STATS: merged right panel ── */
.ps-merged{
  flex:1;display:grid;
  grid-template-columns:1fr 340px;
  overflow:hidden;
  border-left:1px solid var(--b1);
}
.ps-merged-left{overflow-y:auto;padding:28px 32px;border-right:1px solid var(--b1)}
.ps-merged-left::-webkit-scrollbar{width:3px}.ps-merged-left::-webkit-scrollbar-thumb{background:var(--b2)}
.ps-merged-right{overflow-y:auto;padding:24px 20px;background:var(--s1)}
.ps-merged-right::-webkit-scrollbar{width:2px}.ps-merged-right::-webkit-scrollbar-thumb{background:var(--b2)}
.ps-merged-right-title{font-size:8px;letter-spacing:3px;color:var(--mid);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.ps-merged-right-title::after{content:'';flex:1;height:1px;background:var(--b1)}

/* ══════════════════════════════════════
   AWARDS VIEW
══════════════════════════════════════ */
#v-awards{padding:36px}
.aw-top{margin-bottom:32px}
.aw-sup{font-size:9px;letter-spacing:4px;color:var(--mid);text-transform:uppercase;margin-bottom:6px}
.aw-title{font-family:'Bebas Neue';font-size:44px;letter-spacing:7px;color:var(--gold);display:flex;align-items:center;gap:18px;line-height:1}
.aw-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--b3),transparent)}
.aw-sub{font-size:9px;color:var(--dim);letter-spacing:3px;text-transform:uppercase;margin-top:5px}

.aw-sumbar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--b1);margin-bottom:32px;border-radius:3px;overflow:hidden}
.aw-si{background:var(--s1);padding:18px 22px;position:relative;overflow:hidden}
.aw-si::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(200,155,60,.04),transparent)}
.aw-si-lbl{font-size:8px;letter-spacing:3px;color:var(--mid);text-transform:uppercase;margin-bottom:7px}
.aw-si-val{font-family:'Bebas Neue';font-size:34px;letter-spacing:2px;color:var(--txt);line-height:1}

.aw-heroes{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b1);margin-bottom:28px;border-radius:3px;overflow:hidden}
.aw-hc{position:relative;background:var(--s1);overflow:hidden;min-height:190px;display:flex;align-items:flex-end;transition:filter .2s}
.aw-hc:hover{filter:brightness(1.07)}
.aw-hc-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0a0a16 0%,#150f00 100%)}
.aw-hc-pat{position:absolute;inset:0;opacity:.04;background-image:repeating-linear-gradient(45deg,var(--gold) 0,var(--gold) 1px,transparent 0,transparent 50%);background-size:18px 18px}
.aw-hc-img{position:absolute;right:0;top:0;bottom:0;width:52%;overflow:hidden}
.aw-hc-img-in{width:100%;height:100%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:64px;color:rgba(200,155,60,.1);position:relative}
.aw-hc-img-in img{width:100%;height:100%;object-fit:cover;mask-image:linear-gradient(to left,rgba(0,0,0,.85) 0%,rgba(0,0,0,.4) 50%,transparent 100%);-webkit-mask-image:linear-gradient(to left,rgba(0,0,0,.85) 0%,rgba(0,0,0,.4) 50%,transparent 100%)}
.aw-hc-fade{position:absolute;inset:0;background:linear-gradient(to right,var(--s1) 0%,var(--s1) 30%,rgba(13,13,26,.55) 58%,transparent 100%)}
.aw-hc-body{position:relative;z-index:2;padding:24px 28px;flex:1}
.aw-hc-tag{display:inline-block;font-size:8px;letter-spacing:3px;font-weight:700;padding:3px 9px;border-radius:2px;margin-bottom:10px;text-transform:uppercase}
.aw-hc-tag.gold{background:var(--gold);color:#000}.aw-hc-tag.cyan{background:var(--cyan);color:#000}.aw-hc-tag.pur{background:var(--purple);color:#fff}
.aw-hc-name{font-family:'Bebas Neue';font-size:42px;letter-spacing:3px;color:var(--txt);line-height:1;margin-bottom:6px}
.aw-hc-desc{font-size:11px;color:var(--mid);line-height:1.6;margin-bottom:14px;max-width:240px}
.aw-hc-stats{display:flex;gap:18px}
.aw-hs{display:flex;flex-direction:column;gap:1px}
.aw-hs-v{font-family:'Bebas Neue';font-size:20px;letter-spacing:1px;color:var(--gold);line-height:1}
.aw-hs-l{font-size:7px;letter-spacing:2px;color:var(--dim);text-transform:uppercase}

.aw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--b1);border-radius:3px;overflow:hidden}
.aw-lc{background:var(--s1);padding:20px 22px;position:relative;transition:background .2s;overflow:hidden}
.aw-lc:hover{background:var(--s2)}
.aw-lc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--gold),transparent 55%)}
.aw-lc-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.aw-lc-ico{font-size:15px;opacity:.75;margin-top:1px}
.aw-lc-t{font-family:'Bebas Neue';font-size:17px;letter-spacing:3px}
.aw-lc-s{font-size:7px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-top:2px}
.aw-lrow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--b1);position:relative}
.aw-lrow:last-child{border-bottom:none}
.aw-lrk{font-family:'Bebas Neue';font-size:20px;width:20px;text-align:center;flex-shrink:0}
.aw-lrk.g1{color:var(--gold)}.aw-lrk.g2{color:var(--silver)}.aw-lrk.g3{color:var(--bronze)}
.aw-lav{width:32px;height:32px;border-radius:5px;background:var(--s3);border:1px solid var(--b2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:14px;color:var(--gold);position:relative}
.aw-lav img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.aw-lmid{flex:1;min-width:0}
.aw-lnm{font-size:13px;font-weight:600;letter-spacing:0;color:var(--txt)}
.aw-lbar-t{height:2px;border-radius:1px;margin-top:4px;transition:width .8s ease}
.aw-lbar-t.g1{background:linear-gradient(90deg,var(--gold),transparent)}
.aw-lbar-t.g2{background:linear-gradient(90deg,var(--silver),transparent)}
.aw-lbar-t.g3{background:linear-gradient(90deg,var(--bronze),transparent)}
.aw-lv{font-family:'Bebas Neue';font-size:18px;letter-spacing:1px;color:var(--gl);flex-shrink:0}

/* ══════════════════════════════════════
   PLAYER STATS VIEW  (Nexus style)
══════════════════════════════════════ */
#v-players{flex-direction:row !important;height:calc(100vh - 54px);overflow:hidden}

.ps-left{
  width:280px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--b1);
  display:flex;flex-direction:column;overflow:hidden;
}
.ps-left-hd{padding:14px 16px;border-bottom:1px solid var(--b1);flex-shrink:0}
.ps-left-title{font-size:8px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
.ps-search{position:relative}
.ps-search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--mid);pointer-events:none}
.ps-search-inp{width:100%;background:var(--s2);border:1px solid var(--b2);color:var(--txt);padding:7px 10px 7px 30px;font-family:'Noto Sans KR';font-size:12px;border-radius:3px;outline:none;transition:border-color .2s}
.ps-search-inp:focus{border-color:var(--gold)}
.ps-roster{flex:1;overflow-y:auto}
.ps-roster::-webkit-scrollbar{width:2px}.ps-roster::-webkit-scrollbar-thumb{background:var(--b3)}

.ps-pitem{
  display:flex;align-items:center;gap:11px;padding:11px 16px;cursor:pointer;
  transition:background .15s;border-bottom:1px solid var(--b1);border-left:2px solid transparent;
  position:relative;
}
.ps-pitem:hover{background:var(--s2)}
.ps-pitem.sel{background:var(--gb);border-left-color:var(--gold)}
.ps-pav{width:44px;height:44px;border-radius:7px;background:var(--s3);border:1px solid var(--b2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:20px;color:var(--gold);position:relative}
.ps-pav img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.ps-pav-cam{position:absolute;bottom:1px;right:1px;width:14px;height:14px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;cursor:pointer;border:1px solid var(--bg)}
.ps-pinfo{flex:1;min-width:0}
.ps-pname{font-family:'Bebas Neue';font-size:16px;letter-spacing:1px;line-height:1.2}
.ps-psub{font-size:10px;color:var(--mid);margin-top:2px;letter-spacing:0}
.ps-pkda{font-size:11px;color:var(--gl);font-weight:600;margin-top:1px;letter-spacing:0}
.ps-pwr{font-size:10px;font-weight:700;padding:2px 6px;border-radius:2px;flex-shrink:0;letter-spacing:0}
.wr-g{background:rgba(102,187,106,.14);color:var(--green)}.wr-b{background:rgba(239,83,80,.1);color:var(--red)}.wr-m{background:rgba(90,90,138,.15);color:var(--mid)}

.ps-right{flex:1;overflow:hidden;background:var(--s2);display:flex;flex-direction:column}
.ps-no-sel{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--dim);font-size:10px;letter-spacing:2px;text-transform:uppercase;gap:12px;padding:60px;text-align:center}
.ps-no-sel-ico{font-size:44px;opacity:.2}

/* ══════════════════════════════════════
   TEAM COMPARE VIEW  (Hextech style)
══════════════════════════════════════ */
#v-compare{flex-direction:row;height:calc(100vh - 54px);overflow:hidden}

.tc-blue{
  width:260px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--b1);
  display:flex;flex-direction:column;overflow:hidden;
}
.tc-red{
  width:260px;flex-shrink:0;background:var(--s1);border-left:1px solid var(--b1);
  display:flex;flex-direction:column;overflow:hidden;
}

.tc-team-hd{padding:14px 16px;border-bottom:1px solid var(--b1);flex-shrink:0}
.tc-team-lbl{font-family:'Bebas Neue';font-size:13px;letter-spacing:3px;margin-bottom:2px}
.tc-team-lbl.blue{color:#64B5F6}.tc-team-lbl.red{color:#EF9A9A}
.tc-team-sub{font-size:8px;letter-spacing:2px;color:var(--dim);text-transform:uppercase}

.tc-slots{flex:1;overflow-y:auto;overflow-x:visible;padding:10px;display:flex;flex-direction:column;gap:6px}
.tc-slots::-webkit-scrollbar{width:2px}.tc-slots::-webkit-scrollbar-thumb{background:var(--b2)}

.tc-slot{
  background:var(--s2);border:1px solid var(--b1);border-radius:4px;
  overflow:visible; 
  transition:border-color .2s;cursor:default;
}
.tc-slot.empty{cursor:pointer}.tc-slot.empty:hover{border-color:var(--b3)}
.tc-slot-top{display:flex;align-items:center;gap:8px;padding:8px 10px}
.tc-slot-lane{font-size:13px;flex-shrink:0}
.tc-slot-lane-nm{font-size:10px;letter-spacing:.5px;color:var(--mid);text-transform:uppercase;flex:1;font-weight:500}
.tc-slot-clear{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:2px;transition:color .2s;line-height:1}
.tc-slot-clear:hover{color:var(--red)}

.tc-slot-player{display:flex;align-items:center;gap:8px;padding:9px 10px;border-top:1px solid var(--b1)}
.tc-slot-av{width:34px;height:34px;border-radius:5px;background:var(--s3);border:1px solid var(--b2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:15px;color:var(--gold);position:relative}
.tc-slot-av img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.tc-slot-pname{font-size:13px;font-weight:700;letter-spacing:0;flex:1;color:var(--txt)}
.tc-slot-stat{font-size:10px;color:var(--mid);letter-spacing:0;margin-top:1px}

.tc-slot-empty-body{padding:8px 10px;border-top:1px solid var(--b1);display:flex;align-items:center;gap:8px}
.tc-slot-add-btn{background:var(--b1);border:1px solid var(--b2);color:var(--mid);padding:4px 10px;font-size:9px;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .2s}
.tc-slot-add-btn:hover{border-color:var(--gold);color:var(--gold)}
.tc-slot-empty-lbl{font-size:10px;color:var(--dim);flex:1}

.tc-red .tc-slot-top{flex-direction:row-reverse}
.tc-red .tc-slot-lane-nm{text-align:right}
.tc-red .tc-slot-player{flex-direction:row-reverse}
.tc-red .tc-slot-pname{text-align:right}
.tc-red .tc-slot-stat{text-align:right}
.tc-red .tc-slot-empty-body{flex-direction:row-reverse}
.tc-red .tc-slot-empty-lbl{text-align:right}

.tc-center{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:18px}
.tc-center::-webkit-scrollbar{width:3px}.tc-center::-webkit-scrollbar-thumb{background:var(--b2)}

.tc-prob{background:var(--s1);border:1px solid var(--b1);border-radius:4px;padding:20px 24px}
.tc-prob-title{font-size:8px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:16px;text-align:center}
.tc-prob-nums{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px}
.tc-prob-pct{font-family:'Bebas Neue';font-size:52px;letter-spacing:2px;line-height:1}
.tc-prob-pct.blue{color:var(--cyan)}.tc-prob-pct.red{color:var(--pink)}
.tc-prob-lbl{font-size:8px;letter-spacing:2px;color:var(--mid);text-transform:uppercase;margin-bottom:6px}
.tc-prob-bar{height:8px;border-radius:4px;overflow:hidden;background:var(--s3);display:flex}
.tc-prob-bar-b{height:100%;background:var(--cyan);transition:width .8s ease;border-radius:4px 0 0 4px}
.tc-prob-bar-r{height:100%;background:var(--pink);flex:1;border-radius:0 4px 4px 0}

.tc-matchup-title{font-size:8px;letter-spacing:3px;color:var(--mid);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.tc-matchup-title::before,.tc-matchup-title::after{content:'';flex:1;height:1px;background:var(--b1)}

.tc-lane-mu{background:var(--s1);border:1px solid var(--b1);border-radius:4px;overflow:hidden;margin-bottom:6px}
.tc-mu-hd{display:grid;grid-template-columns:1fr 48px 1fr;align-items:center;padding:10px 14px;gap:6px;border-bottom:1px solid var(--b1)}
.tc-mu-bp{display:flex;align-items:center;gap:8px}
.tc-mu-rp{display:flex;align-items:center;gap:8px;flex-direction:row-reverse}
.tc-mu-av{width:32px;height:32px;border-radius:5px;background:var(--s3);border:1px solid var(--b2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:14px;color:var(--gold);position:relative}
.tc-mu-av img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.tc-mu-nm{font-family:'Bebas Neue';font-size:15px;letter-spacing:1px}
.tc-mu-center{text-align:center}
.tc-mu-icon{font-size:16px}
.tc-mu-lane-l{font-size:7px;letter-spacing:1px;color:var(--dim);text-transform:uppercase}

.tc-slot-search-wrap{padding:6px 10px 8px;border-top:1px solid var(--b1);position:relative}
.tc-slot-search-inp{
  width:100%;background:var(--s3);border:1px solid var(--b2);color:var(--txt);
  padding:7px 10px 7px 28px;font-family:'Noto Sans KR';font-size:12px;font-weight:400;
  border-radius:3px;outline:none;transition:border-color .2s;letter-spacing:0;
}
.tc-slot-search-inp::placeholder{color:var(--mid);font-size:11px}
.tc-slot-search-inp:focus{border-color:var(--gold)}
.tc-slot-search-ico{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--dim);pointer-events:none}

.tc-slot-dd{
  position:fixed;
  background:#141424;border:1px solid var(--b3);
  border-radius:5px;z-index:9999;width:220px;max-height:220px;overflow-y:auto;
  box-shadow:0 8px 28px rgba(0,0,0,.8);
}
.tc-slot-dd::-webkit-scrollbar{width:3px}.tc-slot-dd::-webkit-scrollbar-thumb{background:var(--b3)}
.tc-slot-dd-item{
  display:flex;align-items:center;gap:9px;padding:8px 12px;cursor:pointer;
  transition:background .12s;border-bottom:1px solid rgba(255,255,255,.04);
}
.tc-slot-dd-item:last-child{border-bottom:none}
.tc-slot-dd-item:hover{background:rgba(200,155,60,.1)}
.tc-slot-dd-av{width:26px;height:26px;border-radius:4px;background:var(--s3);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:12px;color:var(--gold);position:relative}
.tc-slot-dd-av img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.tc-slot-dd-name{font-size:13px;font-weight:600;color:var(--txt);letter-spacing:0;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc-slot-dd-sub{font-size:10px;color:var(--mid);margin-top:1px;letter-spacing:0}
.tc-slot-dd-wr{font-size:10px;font-weight:700;flex-shrink:0;padding:1px 5px;border-radius:2px}
.tc-slot-dd-wr.g{background:rgba(102,187,106,.15);color:var(--green)}
.tc-slot-dd-wr.b{background:rgba(239,83,80,.12);color:var(--red)}
.tc-slot-dd-wr.m{color:var(--mid)}
.tc-slot-dd-empty{padding:14px;text-align:center;font-size:11px;color:var(--mid)}

<script>
/* ════════════════════════════════════════
   CONFIG
════════════════════════════════════════ */
const CONFIG = {
  APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzhzIUs08gz6kzLqyeiwrBiKDWePoAMl8cMfVh23R0c5d24s6tpmGc7dm8Y92XSYZXY/exec',
  COL: {
    MID:'매치ID', TIME:'게임시간', DISC:'디스코드ID', NAME:'소환사명', POS:'포지션',
    AI:'AI스코어', WIN:'승패', K:'K', D:'D', A:'A', SK:'솔로킬',
    DMG:'총딜량', DPM:'분당딜(DPM)', RDMG:'받은피해', CS:'총CS',
    GPM:'분당골드(GPM)', WARD:'와드설치', NOTE:'비고',
  }
};

/* ════ UTILS ════ */
function n(v){ const s=String(v||'').replace(/,/g,''); return parseFloat(s)||0; }
function secFromMMSS(v){ const p=String(v||'').split(':'); return p.length===2?parseInt(p[0])*60+parseInt(p[1]):n(v); }

/* ════ IMAGES (localStorage) ════ */
let imgs = JSON.parse(localStorage.getItem('lol_imgs')||'{}');
function gi(name){ return imgs[name]||null; }
function saveImgs(){ try{ localStorage.setItem('lol_imgs', JSON.stringify(imgs)); }catch(e){} }

/* ════ GLOBALS ════ */
let RAW = [];
let PLAYERS = [];
let selPlayer = null;

/* ════ LOADING / ERROR UI ════ */
function showLoading(){
  ['awHeroes','awGrid','psRoster'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;padding:60px;gap:14px;grid-column:1/-1"><div style="width:32px;height:32px;border:2px solid var(--b2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite"></div><div style="font-size:11px;color:var(--mid);letter-spacing:2px">불러오는 중...</div></div>`;
  });
  ['sg','sp','sk','st'].forEach(id=>{ const el=document.getElementById(id); if(el)el.textContent='—'; });
}
function showError(msg){
  const html=`<div style="grid-column:1/-1;padding:28px;background:#140a0a;border:1px solid #3a1515;border-radius:6px;margin:16px"><div style="font-size:13px;font-weight:700;color:#EF5350;margin-bottom:8px">⚠️ 데이터 로드 실패</div><div style="font-size:11px;color:#886060;line-height:1.8">${msg}</div><ul style="font-size:11px;color:var(--mid);margin-top:12px;padding-left:18px;line-height:2"><li>Apps Script가 <b>웹 앱</b>으로 배포되어 있는지 확인</li><li>액세스 권한이 <b>"모든 사용자"</b>로 설정되어 있는지 확인</li><li>DB 시트에 <b>"소환사명"</b> 헤더가 존재하는지 확인</li></ul></div>`;
  ['awGrid','psRoster'].forEach(id=>{ const el=document.getElementById(id); if(el)el.innerHTML=html; });
}

/* ════ FETCH ════ */
async function loadFromSheets(){
  showLoading();
  try{
    // 리다이렉트 및 CORS 이슈 방지를 위해 옵션 추가[cite: 1]
    const res = await fetch(CONFIG.APPS_SCRIPT_URL, { redirect: 'follow' });
    if(!res.ok) throw new Error(`서버 응답 오류: HTTP ${res.status}`);
    
    const json = await res.json();
    const rows = json.data || json;
    
    if(!Array.isArray(rows)||rows.length===0) throw new Error('데이터가 없거나 배열 형식이 아닙니다.');
    
    const C=CONFIG.COL;
    const g=(row,...keys)=>{ for(const k of keys){ const v=row[k]; if(v!==undefined&&v!==null&&v!=='')return v; } return ''; };
    
    RAW = rows.map(row=>({
      mid:  String(g(row,C.MID,'매치ID')||''),
      sec:  secFromMMSS(g(row,C.TIME,'게임시간')),
      disc: String(g(row,C.DISC,'디스코드ID')||g(row,C.NAME,'소환사명')||''),
      name: String(g(row,C.NAME,'소환사명')||''),
      pos:  String(g(row,C.POS,'포지션')||''),
      ai:   n(g(row,C.AI,'AI스코어')),
      win:  String(g(row,C.WIN,'승패')||''),
      k:n(g(row,C.K,'K')),d:n(g(row,C.D,'D')),a:n(g(row,C.A,'A')),
      sk:   n(g(row,C.SK,'솔로킬')),
      tdmg: n(g(row,C.DMG,'총딜량')),
      dpm:  n(g(row,C.DPM,'분당딜(DPM)','분당딜')),
      rdmg: n(g(row,C.RDMG,'받은피해')),
      cs:   n(g(row,C.CS,'총CS')),
      gpm:  n(g(row,C.GPM,'분당골드(GPM)','분당골드')),
      ward: n(g(row,C.WARD,'와드설치')),
      note: String(g(row,C.NOTE,'비고')||''),
    })).filter(r=>r.name.trim()!=='');
    
    if(RAW.length===0) throw new Error('소환사명 컬럼을 찾을 수 없거나 데이터가 비어 있습니다.');
    
    processAndRender();
  }catch(e){ 
    console.error(e); 
    // 브라우저에 표시되는 에러 메시지 보강
    showError(e.message + (e.message.includes('fetch') ? '<br><br>* CORS 에러일 확률이 높습니다. Apps Script 배포 시 접근 권한을 "모든 사용자(Anyone)"로 변경해주세요.' : '')); 
  }
}

/* ════ TEAM COMPARE GLOBALS ════ */
const LANES=[
  {id:'top',    nm:'TOP',    ico:'⚔️'},
  {id:'jungle', nm:'JUNGLE', ico:'🌲'},
  {id:'mid',    nm:'MID',    ico:'⚡'},
  {id:'adc',    nm:'BOT',    ico:'🏹'},
  {id:'support',nm:'SUP',    ico:'🛡️'},
];
let cmpSlots={blue:Array(5).fill(null),red:Array(5).fill(null)};

/* Single global dropdown for compare */
let _ddTeam=null,_ddIdx=null;
const _ddEl=(()=>{
  const el=document.createElement('div');
  el.className='tc-slot-dd';
  el.style.display='none';
  document.body.appendChild(el);
  return el;
})();

/* ════ AWARDS ════ */
function top3(key){ return [...PLAYERS].sort((a,b)=>b[key]-a[key]).slice(0,3); }
function top1(key){ return [...PLAYERS].sort((a,b)=>b[key]-a[key])[0]; }

function heroCard(p,tag,tagCls,desc,stats){
  const img=gi(p.name);
  return`<div class="aw-hc"><div class="aw-hc-bg"></div><div class="aw-hc-pat"></div>
    <div class="aw-hc-img"><div class="aw-hc-img-in">${img?`<img src="${img}" onerror="this.style.display='none'">`:''}${p.name[0]}</div></div>
    <div class="aw-hc-fade"></div>
    <div class="aw-hc-body">
      <div class="aw-hc-tag ${tagCls}">${tag}</div>
      <div class="aw-hc-name">${p.name}</div>
      <div class="aw-hc-desc">${desc}</div>
      <div class="aw-hc-stats">${stats.map(s=>`<div class="aw-hs"><div class="aw-hs-v">${s.v}</div><div class="aw-hs-l">${s.l}</div></div>`).join('')}</div>
    </div></div>`;
}

function lboard(icon,title,sub,key,fmt){
  const pod=top3(key);
  const mx=pod[0]?pod[0][key]:1;
  const allSorted=[...PLAYERS].sort((a,b)=>b[key]-a[key]);
  const selRank=selPlayer?allSorted.findIndex(x=>x.name===selPlayer.name)+1:-1;
  const selInTop3=selPlayer&&pod.some(x=>x.name===selPlayer.name);
  return`<div class="aw-lc">
    <div class="aw-lc-hd">
      <div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
          <span class="aw-lc-ico">${icon}</span>
          <span style="font-family:'Bebas Neue';font-size:18px;letter-spacing:2px;color:var(--txt)">${title}</span>
        </div>
        <div style="font-size:10px;color:var(--mid)">${sub}</div>
      </div>
      ${selPlayer&&!selInTop3?`<div style="font-size:10px;color:var(--mid);text-align:right;flex-shrink:0"><div style="color:var(--txt);font-weight:700">${selRank}위</div><div style="color:var(--dim)">${selPlayer.name}</div></div>`:''}
    </div>
    ${pod.map((p,i)=>{
      const bw=Math.round(p[key]/mx*100);
      const img=gi(p.name);
      const isSel=selPlayer&&p.name===selPlayer.name;
      return`<div class="aw-lrow" style="${isSel?'background:rgba(200,155,60,.1);border-left:2px solid var(--gold);':''}">
        <div class="aw-lrk g${i+1}">${i+1}</div>
        <div class="aw-lav">${img?`<img src="${img}" onerror="this.style.display='none'">`:''}${p.name[0]}</div>
        <div class="aw-lmid">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
            <div style="font-size:13px;font-weight:${isSel?700:600};color:${isSel?'var(--gold)':'var(--txt)'}">${p.name}</div>
            <div style="font-family:'Bebas Neue';font-size:16px;color:var(--gl)">${fmt(p[key])}</div>
          </div>
          <div class="aw-lbar-t g${i+1}" style="width:${bw}%"></div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderAwards(){
  const mvpP=PLAYERS.filter(p=>p.mvp>0).sort((a,b)=>b.mvp-a.mvp)[0]||top1('kda');
  const aiP=top1('ai');
  document.getElementById('awHeroes').innerHTML=
    heroCard(mvpP,'Season MVP','gold',`${mvpP.pos} 포지션에서 내전을 지배한 최고의 선수.`,[{v:mvpP.games,l:'Games'},{v:mvpP.kda+':1',l:'KDA'},{v:mvpP.dpm.toLocaleString(),l:'DPM'}])+
    heroCard(aiP,'AI Score #1','pur',`AI 분석 기준 시즌 최우수 퍼포머.`,[{v:aiP.ai,l:'AI Score'},{v:aiP.wr+'%',l:'Win Rate'},{v:aiP.sk,l:'Solo Kill'}]);
  document.getElementById('awGrid').innerHTML=[
    lboard('⚡','분당 딜량','DPM','dpm',v=>v.toLocaleString()),
    lboard('💀','KDA 비율','킬·데스·어시스트','kda',v=>v.toFixed(2)),
    lboard('💰','분당 골드','GPM','gpm',v=>v.toLocaleString()),
    lboard('🌾','분당 CS','CSPM','cspm',v=>v.toFixed(1)),
    lboard('👁️','와드 설치','시야 기여','ward',v=>Math.round(v)),
    lboard('🎯','솔로킬','누적 솔로킬','sk',v=>Math.round(v)),
    lboard('🏆','승률','승률 기준','wr',v=>v+'%'),
    lboard('🔥','딜 비중','팀 내 딜 비중','dmgShare',v=>v.toFixed(1)+'%'),
    lboard('🤖','AI 점수','AI 평가 평균','ai',v=>v.toFixed(1)),
  ].join('');
}

/* ════ PLAYER LIST ════ */
function renderRoster(list){
  document.getElementById('psRoster').innerHTML=list.map(p=>{
    const img=gi(p.name);
    const wc=p.wr>=55?'wr-g':p.wr<45?'wr-b':'wr-m';
    const sel=selPlayer&&selPlayer.name===p.name?'sel':'';
    return`<div class="ps-pitem ${sel}" onclick="selP('${p.name}')">
      <div class="ps-pav">${img?`<img src="${img}" onerror="this.style.display='none'">`:''}${p.name[0]}
        <div class="ps-pav-cam" onclick="event.stopPropagation();openModal('${p.name}')">📷</div>
      </div>
      <div class="ps-pinfo">
        <div class="ps-pname">${p.name}</div>
        <div class="ps-psub">${p.pos} · ${p.games}게임</div>
        <div class="ps-pkda">KDA ${p.kda}:1</div>
      </div>
      <div class="ps-pwr ${wc}">${p.wr}%</div>
    </div>`;
  }).join('');
}
function filterPS(q){ renderRoster(q?PLAYERS.filter(p=>p.name.includes(q)||p.disc.includes(q)):PLAYERS); }

/* ════ PLAYER DETAIL ════ */
function grade(p){
  const sc=(p.kda/10*0.3)+(p.wr/100*0.4)+(p.ai/100*0.3);
  if(sc>=0.75)return{g:'S+',c:'#F0E6A0'};
  if(sc>=0.60)return{g:'S', c:'#C89B3C'};
  if(sc>=0.45)return{g:'A', c:'#4FC3F7'};
  if(sc>=0.30)return{g:'B', c:'#66BB6A'};
  return{g:'C',c:'#5a5a8a'};
}
function getRank(p,key){ return [...PLAYERS].sort((a,b)=>b[key]-a[key]).findIndex(x=>x.name===p.name)+1; }
function rankBadge(rank,total){
  const c=rank===1?'#F0E6A0':rank<=3?'#C89B3C':rank<=Math.ceil(total/3)?'#4FC3F7':'#5a5a8a';
  return`<span style="font-size:9px;font-weight:700;color:${c};background:${c}18;border:1px solid ${c}44;padding:1px 6px;border-radius:2px">${rank}위</span>`;
}

function selP(name){
  selPlayer=PLAYERS.find(p=>p.name===name);
  renderRoster(PLAYERS.filter(p=>{ const q=document.getElementById('psSearch').value; return !q||p.name.includes(q)||p.disc.includes(q); }));
  renderPlayerPanel(selPlayer);
  if(document.getElementById('v-awards').classList.contains('on')) renderAwards();
}

function renderPlayerPanel(p){
  const img=gi(p.name);
  const gr=grade(p);
  const kc=p.kda>=3?'#66BB6A':p.kda>=2?'#F0E6A0':'#EF5350';
  const wrc=p.wr>=55?'#66BB6A':p.wr<45?'#EF5350':'#5a5a8a';
  const total=PLAYERS.length;
  const ranks={
    dpm:getRank(p,'dpm'),gpm:getRank(p,'gpm'),kda:getRank(p,'kda'),
    cspm:getRank(p,'cspm'),wr:getRank(p,'wr'),ai:getRank(p,'ai'),
    ward:getRank(p,'ward'),sk:getRank(p,'sk'),dmgShare:getRank(p,'dmgShare'),
  };
  const maxD={
    dpm:Math.max(...PLAYERS.map(x=>x.dpm),1),gpm:Math.max(...PLAYERS.map(x=>x.gpm),1),
    cspm:Math.max(...PLAYERS.map(x=>x.cspm),1),kda:Math.max(...PLAYERS.map(x=>x.kda),1),
    ai:Math.max(...PLAYERS.map(x=>x.ai),1),ward:Math.max(...PLAYERS.map(x=>x.ward),1),
  };
  const axes4=[
    {lbl:'공격력',val:((p.kda/maxD.kda)+(p.dpm/maxD.dpm))/2},
    {lbl:'시야',  val:p.ward/maxD.ward},
    {lbl:'팀파이트',val:((p.dmgShare/35)+(p.ai/maxD.ai))/2},
    {lbl:'운영',  val:((p.gpm/maxD.gpm)+(p.cspm/maxD.cspm))/2},
  ];
  const n4=4,cx=120,cy=120,r=85,lr=110;
  const ang4=i=>(Math.PI*2*i/n4)-Math.PI/2;
  const pt4=(i,v)=>[cx+Math.cos(ang4(i))*r*v, cy+Math.sin(ang4(i))*r*v];
  const lpt4=i=>[cx+Math.cos(ang4(i))*lr, cy+Math.sin(ang4(i))*lr];

function showDD(team,i){
  _ddTeam=team;_ddIdx=i;
  const inp=document.getElementById(`ss-${team}-${i}`);
  _renderDD(team,i,inp?inp.value:'');
  const wrap=document.getElementById(`sw-${team}-${i}`);
  if(!wrap)return;
  const rect=wrap.getBoundingClientRect();
  _ddEl.style.cssText=`display:block;left:${rect.left}px;top:${rect.bottom+2}px;width:${rect.width}px`;
}
function filterDD(team,i,q){
  if(_ddTeam===team&&_ddIdx===i) _renderDD(team,i,q);
  else showDD(team,i);
}
function _renderDD(team,i,q=''){
  const used=new Set([...cmpSlots.blue,...cmpSlots.red].filter(Boolean).map(p=>p.name));
  let avail=PLAYERS.filter(p=>!used.has(p.name)).sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  const res=q.trim()?avail.filter(p=>p.name.includes(q.trim())||p.disc.includes(q.trim())):avail;
  const posMap={탑:'TOP',정글:'JGL',미드:'MID',원딜:'BOT',서포터:'SUP'};
  if(!res.length){ _ddEl.innerHTML=`<div class="tc-slot-dd-empty">검색 결과 없음</div>`; return; }
  _ddEl.innerHTML=res.slice(0,12).map(p=>{
    const img=gi(p.name);
    const wc=p.wr>=55?'g':p.wr<45?'b':'m';
    return`<div class="tc-slot-dd-item" onmousedown="pickSlot('${team}',${i},'${p.name}')">
      <div class="tc-slot-dd-av">${img?`<img src="${img}" onerror="this.style.display='none'">`:''}${p.name[0]}</div>
      <div style="flex:1;min-width:0"><div class="tc-slot-dd-name">${p.name}</div><div class="tc-slot-dd-sub">${posMap[p.pos]||p.pos} · KDA ${p.kda} · ${p.games}게임</div></div>
      <div class="tc-slot-dd-wr ${wc}">${p.wr}%</div>
    </div>`;
  }).join('');
}
function pickSlot(team,i,name){
  cmpSlots[team][i]=PLAYERS.find(p=>p.name===name);
  _ddEl.style.display='none';_ddTeam=null;_ddIdx=null;
  renderCmpSlots();
}
function clearSlot(team,i){ cmpSlots[team][i]=null;_ddEl.style.display='none';renderCmpSlots(); }

document.addEventListener('mousedown',e=>{
  if(!e.target.closest('.tc-slot-search-wrap')&&!e.target.closest('.tc-slot-dd')){
    _ddEl.style.display='none';_ddTeam=null;_ddIdx=null;
  }
});

function radarSVG(bP,rP,size=180){
  const maxD={kda:Math.max(...PLAYERS.map(x=>x.kda),1),dpm:Math.max(...PLAYERS.map(x=>x.dpm),1),gpm:Math.max(...PLAYERS.map(x=>x.gpm),1),cspm:Math.max(...PLAYERS.map(x=>x.cspm),1),ai:Math.max(...PLAYERS.map(x=>x.ai),1)};
  const AXES=[{key:'kda',lbl:'KDA'},{key:'dpm',lbl:'DPM'},{key:'gpm',lbl:'GOLD'},{key:'cspm',lbl:'CS/M'},{key:'wr',lbl:'WIN%',max:100},{key:'ai',lbl:'AI'}];
  const n=AXES.length,cx=size/2,cy=size/2,r=(size/2)*0.62,lr=(size/2)*0.82;
  const ang=i=>(Math.PI*2*i/n)-Math.PI/2;
  const pt=(i,v)=>[cx+Math.cos(ang(i))*r*v,cy+Math.sin(ang(i))*r*v];
  const lpt=i=>[cx+Math.cos(ang(i))*lr,cy+Math.sin(ang(i))*lr];
  let grid='';
  [.25,.5,.75,1].forEach(v=>{ grid+=`<polygon points="${AXES.map((_,i)=>pt(i,v).join(',')).join(' ')}" fill="none" stroke="${v===1?'rgba(200,155,60,.25)':'rgba(255,255,255,.06)'}" stroke-width="${v===1?1:.7}"/>`; });
  const axLines=AXES.map((_,i)=>{const[x,y]=pt(i,1);return`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="rgba(255,255,255,.07)" stroke-width=".7"/>`;}).join('');
  const poly=(p,color,op)=>{if(!p)return'';const pts=AXES.map((ax,i)=>pt(i,Math.min(p[ax.key]/(ax.max||maxD[ax.key]),1)).join(',')).join(' ');const dots=AXES.map((ax,i)=>{const[x,y]=pt(i,Math.min(p[ax.key]/(ax.max||maxD[ax.key]),1));return`<circle cx="${x}" cy="${y}" r="3" fill="${color}" opacity=".9"/>`;}).join('');return`<polygon points="${pts}" fill="${color}" fill-opacity="${op}" stroke="${color}" stroke-width="1.5" stroke-opacity=".9"/>${dots}`;};
  const lbls=AXES.map((ax,i)=>{const[x,y]=lpt(i);return`<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" fill="rgba(160,180,200,.7)" font-size="9" font-family="Noto Sans KR">${ax.lbl}</text>`;}).join('');
  return`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${grid}${axLines}${poly(rP,'#ef6fa8',.12)}${poly(bP,'#4FC3F7',.12)}${lbls}</svg>`;
}

function renderCenter(){
  const center=document.getElementById('tcCenter');
  const bF=cmpSlots.blue.filter(Boolean);const rF=cmpSlots.red.filter(Boolean);
  if(!bF.length&&!rF.length){ center.innerHTML='<div style="text-align:center;color:var(--dim);font-size:11px;letter-spacing:1px;padding:80px 0;word-break:keep-all">양 팀 선수를 선택하면<br>분석이 표시됩니다</div>'; return; }
  const sc=ps=>ps.reduce((s,p)=>s+(p.kda*0.3+p.wr*0.5+p.ai*0.2),0)/(ps.length||1);
  const bsc=bF.length?sc(bF):50,rsc=rF.length?sc(rF):50,tot2=bsc+rsc||1;
  const bpct=Math.round(bsc/tot2*100),rpct=100-bpct;
  const avg=(ps,key)=>ps.length?+(ps.reduce((s,p)=>s+p[key],0)/ps.length).toFixed(1):0;
  const CSTATS=[{key:'kda',lbl:'KDA',fmt:v=>v.toFixed(2)},{key:'dpm',lbl:'DPM',fmt:v=>v.toLocaleString()},{key:'gpm',lbl:'골드/분',fmt:v=>v.toLocaleString()},{key:'cspm',lbl:'CS/분',fmt:v=>v.toFixed(1)},{key:'wr',lbl:'승률',fmt:v=>v+'%'}];
  const laneCards=LANES.map((lane,i)=>{
    const b=cmpSlots.blue[i],r=cmpSlots.red[i];if(!b&&!r)return'';
    const bImg=b?gi(b.name):null,rImg=r?gi(r.name):null;
    const statRows=CSTATS.map(st=>{
      const bv=b?b[st.key]:null,rv=r?r[st.key]:null;
      const bc=bv!=null&&rv!=null?(bv>rv?'win':bv<rv?'lose':'tie'):'tie';
      const rc=bv!=null&&rv!=null?(rv>bv?'win':rv<bv?'lose':'tie'):'tie';
      const clr={win:'var(--green)',lose:'var(--red)',tie:'var(--mid)'};
      return`<div style="display:grid;grid-template-columns:1fr 48px 1fr;align-items:center;gap:4px;margin-bottom:5px"><div style="text-align:right;font-size:12px;font-weight:700;color:${clr[bc]}">${b?st.fmt(bv):'—'}</div><div style="text-align:center;font-size:9px;color:var(--mid)">${st.lbl}</div><div style="font-size:12px;font-weight:700;color:${clr[rc]}">${r?st.fmt(rv):'—'}</div></div>`;
    }).join('');
    const avH=(p,img,color,rev)=>p?`<div style="display:flex;align-items:center;gap:6px;${rev?'flex-direction:row-reverse':''}"><div style="width:32px;height:32px;border-radius:5px;background:var(--s3);border:1px solid ${color}44;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:14px;color:${color};position:relative">${img?`<img src="${img}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0" onerror="this.style.display='none'">`:''}${p.name[0]}</div><div style="${rev?'text-align:right':''}"><div style="font-family:'Bebas Neue';font-size:16px;letter-spacing:1px;color:${color}">${p.name}</div><div style="font-size:9px;color:var(--mid)">${p.wr}% 승률</div></div></div>`:'<div style="font-size:11px;color:var(--dim)">—</div>';
    return`<div style="background:var(--s1);border:1px solid var(--b1);border-radius:6px;overflow:hidden;margin-bottom:10px">
      <div style="display:grid;grid-template-columns:1fr 40px 1fr;align-items:center;padding:10px 14px;border-bottom:1px solid var(--b1);background:linear-gradient(135deg,rgba(79,195,247,.04),transparent 50%,rgba(239,111,168,.04))">
        ${avH(b,bImg,'#4FC3F7',false)}<div style="text-align:center"><div style="font-size:18px">${lane.ico}</div><div style="font-size:8px;color:var(--dim)">${lane.nm}</div></div>${avH(r,rImg,'#ef6fa8',true)}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--b1)">
        <div style="display:flex;align-items:center;justify-content:center;padding:12px;border-right:1px solid var(--b1)">${radarSVG(b,r,180)}</div>
        <div style="padding:12px 14px;display:flex;flex-direction:column;justify-content:center">
          <div style="display:flex;gap:10px;margin-bottom:10px">
            <div style="display:flex;align-items:center;gap:4px;font-size:9px;color:#4FC3F7"><div style="width:10px;height:2px;background:#4FC3F7;border-radius:1px"></div>${b?b.name:'BLUE'}</div>
            <div style="display:flex;align-items:center;gap:4px;font-size:9px;color:#ef6fa8"><div style="width:10px;height:2px;background:#ef6fa8;border-radius:1px"></div>${r?r.name:'RED'}</div>
          </div>
          ${statRows}
        </div>
      </div>
    </div>`;
  }).filter(Boolean).join('');
  const metBar=(bv,rv,lbl,fmt)=>{const t=bv+rv||1;const bw=Math.round(bv/t*100);return`<div style="margin-bottom:10px"><div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;margin-bottom:4px;gap:8px"><span style="font-size:11px;font-weight:700;color:var(--cyan)">${fmt(bv)}</span><span style="font-size:9px;color:var(--mid);text-align:center">${lbl}</span><span style="font-size:11px;font-weight:700;color:var(--pink);text-align:right">${fmt(rv)}</span></div><div style="height:4px;border-radius:2px;overflow:hidden;background:var(--s3);display:flex"><div style="width:${bw}%;background:var(--cyan);border-radius:2px 0 0 2px;transition:width .7s ease"></div><div style="flex:1;background:var(--pink);border-radius:0 2px 2px 0"></div></div></div>`;};
  center.innerHTML=`
    <div style="background:var(--s1);border:1px solid var(--b1);border-radius:6px;padding:18px 22px;margin-bottom:10px">
      <div style="font-size:8px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;text-align:center;margin-bottom:14px">WIN PROBABILITY ANALYSIS</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px">
        <div><div style="font-family:'Bebas Neue';font-size:48px;letter-spacing:2px;color:var(--cyan);line-height:1">${bpct}%</div><div style="font-size:9px;color:var(--mid)">BLUE 예측</div></div>
        <div style="text-align:right"><div style="font-family:'Bebas Neue';font-size:48px;letter-spacing:2px;color:var(--pink);line-height:1">${rpct}%</div><div style="font-size:9px;color:var(--mid)">RED 예측</div></div>
      </div>
      <div style="height:8px;border-radius:4px;overflow:hidden;background:var(--s3);display:flex"><div style="width:${bpct}%;background:var(--cyan);border-radius:4px 0 0 4px;transition:width .8s ease"></div><div style="flex:1;background:var(--pink);border-radius:0 4px 4px 0"></div></div>
    </div>
    <div style="font-size:8px;letter-spacing:3px;color:var(--mid);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px"><div style="flex:1;height:1px;background:var(--b1)"></div>LANE MATCHUP<div style="flex:1;height:1px;background:var(--b1)"></div></div>
    ${laneCards||'<div style="text-align:center;color:var(--dim);font-size:11px;padding:20px">선수를 선택하면 매치업이 표시됩니다</div>'}
    <div style="background:var(--s1);border:1px solid var(--b1);border-radius:6px;padding:18px 22px">
      <div style="font-size:8px;letter-spacing:3px;color:var(--mid);text-transform:uppercase;margin-bottom:14px">팀 종합 지표</div>
      ${metBar(avg(bF,'dpm'),avg(rF,'dpm'),'평균 DPM',v=>Math.round(v).toLocaleString())}
      ${metBar(avg(bF,'gpm'),avg(rF,'gpm'),'평균 GPM',v=>Math.round(v).toLocaleString())}
      ${metBar(avg(bF,'wr'),avg(rF,'wr'),'평균 승률',v=>v.toFixed(1)+'%')}
    </div>`;
}

function gv(id,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('v-'+id).classList.add('on');
  btn.classList.add('on');
}

function openModal(name){
  mTgt=name;mSrc=gi(name)||null;
  const pv=document.getElementById('mPrev');
  pv.innerHTML=`${mSrc?`<img src="${mSrc}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0">`:''}${name[0]}`;
  document.getElementById('mUrl').value=mSrc||'';
  document.getElementById('mFile').value='';
  document.getElementById('imgModal').classList.add('show');
}
function closeModal(){ document.getElementById('imgModal').classList.remove('show');mTgt=null;mSrc=null; }
function closeModalOut(e){ if(e.target.id==='imgModal')closeModal(); }
function prevUrl(){
  const url=document.getElementById('mUrl').value.trim();if(!url)return;
  mSrc=url;const pv=document.getElementById('mPrev');
  let img=pv.querySelector('img');if(!img){img=document.createElement('img');img.style.cssText='width:100%;height:100%;object-fit:cover;position:absolute;inset:0';pv.appendChild(img);}
  img.src=url;
}
function prevFile(e){
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();rd.onload=ev=>{mSrc=ev.target.result;const pv=document.getElementById('mPrev');let img=pv.querySelector('img');if(!img){img=document.createElement('img');img.style.cssText='width:100%;height:100%;object-fit:cover;position:absolute;inset:0';pv.appendChild(img);}img.src=mSrc;};rd.readAsDataURL(f);
}
function saveImg(){
  if(!mTgt)return;
  if(mSrc)imgs[mTgt]=mSrc;else delete imgs[mTgt];
  saveImgs();closeModal();
  const q=document.getElementById('psSearch').value;
  renderRoster(q?PLAYERS.filter(p=>p.name.includes(q)||p.disc.includes(q)):PLAYERS);
  if(selPlayer&&selPlayer.name===mTgt)renderPlayerPanel(selPlayer);
  renderCmpSlots();renderAwards();
}

function processAndRender(){
  const pm={};
  RAW.forEach(r=>{
    if(!pm[r.name])pm[r.name]={name:r.name,disc:r.disc,pos:r.pos,games:0,wins:0,k:0,d:0,a:0,sk:0,tdmg:0,dpm:0,rdmg:0,cs:0,sec:0,gpm:0,ward:0,ai:0,mvp:0,ace:0,dss:0,dsc:0};
    const p=pm[r.name];p.games++;if(r.win==='승')p.wins++;
    p.k+=r.k;p.d+=r.d;p.a+=r.a;p.sk+=r.sk;p.tdmg+=r.tdmg;p.dpm+=r.dpm;
    p.rdmg+=r.rdmg;p.cs+=r.cs;p.sec+=r.sec;p.gpm+=r.gpm;p.ward+=r.ward;p.ai+=r.ai;
    if(r.note&&r.note.includes('MVP'))p.mvp++;if(r.note&&r.note.includes('ACE'))p.ace++;
  });
  const byMatch={};RAW.forEach(r=>{if(!byMatch[r.mid])byMatch[r.mid]=[];byMatch[r.mid].push(r);});
  Object.values(byMatch).forEach(m=>{
    ['승','패'].forEach(side=>{
      const t=m.filter(r=>r.win===side);const tot=t.reduce((s,r)=>s+r.tdmg,0);if(!tot)return;
      t.forEach(r=>{pm[r.name].dss+=(r.tdmg/tot)*100;pm[r.name].dsc++;});
    });
  });
  PLAYERS=Object.values(pm).map(p=>{
    const gm=p.games,gmin=(p.sec/60)||1;
    const kda=p.d===0?(p.k+p.a):+((p.k+p.a)/p.d).toFixed(2);
    return{
      name:p.name,disc:p.disc,pos:p.pos,games:gm,wins:p.wins,
      k:+(p.k/gm).toFixed(1),d:+(p.d/gm).toFixed(1),a:+(p.a/gm).toFixed(1),
      kda:typeof kda==='number'?kda:parseFloat(kda),
      totalK:p.k,totalA:p.a,
      dpm:Math.round(p.dpm/gm),gpm:Math.round(p.gpm/gm),
      cspm:+(p.cs/gmin).toFixed(1),
      dmgShare:p.dsc?+(p.dss/p.dsc).toFixed(1):0,
      rdmg:Math.round(p.rdmg/gm),sk:p.sk,ward:p.ward,
      ai:+(p.ai/gm).toFixed(1),mvp:p.mvp,ace:p.ace,
      wr:Math.round(p.wins/gm*100),
    };
  }).sort((a,b)=>b.games-a.games);

  const mset=new Set(RAW.map(r=>r.mid));
  document.getElementById('sg').textContent=mset.size;
  document.getElementById('sp').textContent=PLAYERS.length;
  const avgKDA=(RAW.reduce((s,r)=>{const d=r.d;return s+(d===0?r.k+r.a:(r.k+r.a)/d)},0)/RAW.length).toFixed(1);
  document.getElementById('sk').textContent=avgKDA;
  const avgMin=(RAW.reduce((s,r)=>s+r.sec,0)/RAW.length/60).toFixed(1);
  document.getElementById('st').textContent=avgMin+'분';

  selPlayer=null;
  cmpSlots={blue:Array(5).fill(null),red:Array(5).fill(null)};
  renderAwards();
  renderRoster(PLAYERS);
  renderCmpSlots();
}

document.addEventListener('DOMContentLoaded', ()=>loadFromSheets());

</script>
</body>
</html>
